# This is a Databricks asset bundle definition for 01_fmcg_domain.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: 01_fmcg_domain
  uuid: 230a25b2-3078-46ae-9866-01d36ec8a643

include:
  - resources/*.yml
  - resources/*/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    presets:
      name_prefix: dev_${workspace.current_user.short_name}
      source_linked_deployment: false
    workspace:
      host: https://dbc-ef7d028e-3ab3.cloud.databricks.com
    variables:
      catalog: workspace
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://dbc-ef7d028e-3ab3.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/25001437@student.datapot.edu.vn to make sure we only have a single copy.
      root_path: /Workspace/Users/25001437@student.datapot.edu.vn/PROD/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - group_name: admins
        level: CAN_MANAGE
